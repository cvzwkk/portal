<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-API Local AI Architect</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
        window.pipeline = pipeline;
    </script>

    <style>
        :root { --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #238636; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; }
        .app-header { padding: 15px 20px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .main { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; background: var(--border); gap: 1px; }
        textarea { background: var(--bg); color: var(--text); border: none; padding: 20px; font-family: monospace; resize: none; outline: none; }
        #preview { padding: 30px; overflow-y: auto; background: white; color: #24292f; }
        .toolbar { padding: 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        button { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #status { font-size: 12px; color: #8b949e; }
        .progress-bar { height: 4px; background: #238636; width: 0%; transition: width 0.3s; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

<div id="loading-bar" class="progress-bar"></div>

<div class="app-header">
    <div>🌐 <strong>STATIC LOCAL AI</strong> <span id="status">| Ready</span></div>
    <div style="font-size: 11px;">Runs in Browser (No API Key Needed)</div>
</div>

<div class="main">
    <textarea id="input" placeholder="Paste messy text here..."></textarea>
    <div id="preview" class="markdown-body"></div>
</div>

<div class="toolbar">
    <button onclick="runLocalAI()">🧠 Run Browser-AI (Mistral-Lite)</button>
    <button style="background:#30363d" onclick="fastFix()">⚡ Fast Regex Fix</button>
    <button style="background:#30363d" onclick="download()">💾 Save .md</button>
</div>

<script>
    let generator = null;
    let mathVault = [];

    // --- 1. LOCAL REGEX ENGINE (Fallback) ---
    function fastFix() {
        let t = document.getElementById('input').value;
        // Clean math first
        t = t.replace(/\$\$[\s\S]*?\[([\s\S]*?)\][\s\S]*?\$\$/g, '$$\n$1\n$$');
        t = t.replace(/(^|\s)\[([\w+-\d]{1,7})\]/g, '$1$$$2$$');
        // Clean text
        t = t.replace(/^(#+)([A-Za-z])/gm, '$1 $2');
        t = t.replace(/\s+([,.!?;:])/g, '$1');
        document.getElementById('input').value = t;
        render();
    }

    // --- 2. IN-BROWSER AI ENGINE ---
    async function runLocalAI() {
        const status = document.getElementById('status');
        const input = document.getElementById('input').value;
        if (!input) return;

        try {
            if (!generator) {
                status.innerText = "| ⏳ Downloading Model (~150MB)...";
                // Loading the ultra-lightweight SmolLM-135M model
                generator = await window.pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct');
                status.innerText = "| ✅ Model Loaded";
            }

            status.innerText = "| 🧠 AI Processing...";
            const prompt = `Clean punctuation and add markdown headers to this text: ${input.substring(0, 500)}`;
            
            const output = await generator(prompt, {
                max_new_tokens: 500,
                temperature: 0.2,
                callback_function: (x) => {
                    document.getElementById('loading-bar').style.width = "50%";
                }
            });

            document.getElementById('input').value = output[0].generated_text;
            render();
            status.innerText = "| ✨ Done";
        } catch (e) {
            console.error(e);
            status.innerText = "| ❌ Browser too weak. Using Fast Fix.";
            fastFix();
        }
    }

    function render() {
        const raw = document.getElementById('input').value;
        document.getElementById('preview').innerHTML = marked.parse(raw);
        if (window.MathJax) MathJax.typesetPromise();
    }

    function download() {
        const blob = new Blob([document.getElementById('input').value], {type: 'text/markdown'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "readme.md";
        a.click();
    }

    document.getElementById('input').addEventListener('input', render);
</script>

</body>
</html>
