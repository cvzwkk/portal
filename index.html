<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen 2.5 Dedicated Runner</title>
    <style>
        :root { --line: #00ff41; --bg: #050505; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--line); margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        
        .terminal-border { border: 1px solid var(--line); padding: 15px; background: #000; display: flex; flex-direction: column; gap: 10px; }
        
        #progress-container { width: 100%; height: 15px; border: 1px solid var(--line); position: relative; display: none; }
        #progress-bar { height: 100%; background: var(--line); width: 0%; transition: width 0.1s; }
        
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid var(--line); padding: 10px; font-family: inherit; resize: none; box-sizing: border-box; }
        
        button { background: transparent; color: var(--line); border: 1px solid var(--line); padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; }
        button:hover { background: var(--line); color: #000; }
        button:disabled { opacity: 0.3; border-color: #333; color: #333; }

        #output-display { flex-grow: 1; border: 1px solid var(--line); margin-top: 10px; padding: 15px; overflow-y: auto; white-space: pre-wrap; color: #fff; font-size: 14px; background: #080808; }
        
        #console-log { height: 120px; border: 1px solid #333; margin-top: 10px; padding: 8px; overflow-y: scroll; font-size: 10px; color: #888; background: #000; }
        #console-log::-webkit-scrollbar { width: 5px; }
        #console-log::-webkit-scrollbar-thumb { background: var(--line); }
        .err { color: #ff3e3e; }
    </style>
</head>
<body>

    <div class="terminal-border">
        <div style="font-size: 12px;">TARGET_MODEL: Qwen2.5-0.5B-Instruct (Quantized)</div>
        <input type="password" id="hf-token" placeholder="HF_TOKEN (Leave empty if public)">
        <button id="init-btn">Initialize Dedicated Model</button>
        
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <textarea id="user-input" rows="3" placeholder="Input system instructions or query..."></textarea>
    <button id="run-btn" disabled>Execute Generation</button>

    <div id="output-display">Awaiting hardware initialization...</div>
    <div id="console-log"></div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        const modelPath = 'onnx-community/Qwen2.5-0.5B-Instruct-ONNX';
        const logBox = document.getElementById('console-log');
        const output = document.getElementById('output-display');
        const progBar = document.getElementById('progress-bar');
        const progCont = document.getElementById('progress-container');
        
        let generator = null;

        function debug(msg, isErr = false) {
            const entry = document.createElement('div');
            if(isErr) entry.className = 'err';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        document.getElementById('init-btn').onclick = async () => {
            const token = document.getElementById('hf-token').value;
            const initBtn = document.getElementById('init-btn');

            try {
                initBtn.disabled = true;
                progCont.style.display = 'block';
                debug("Establishing handshake with HuggingFace...");

                if(token) env.remoteToken = token;
                env.allowLocalModels = false;

                // Targeting the specific quantized model file in the repository
                generator = await pipeline('text-generation', modelPath, {
                    model_file: 'onnx/model_quantized.onnx',
                    progress_callback: (p) => {
                        if(p.status === 'progress') {
                            progBar.style.width = `${p.progress}%`;
                            debug(`DOWNLOADING_${p.file}: ${Math.round(p.progress)}%`);
                        }
                    }
                });

                debug("Model loaded into local device capability.");
                output.textContent = "READY_FOR_INPUT";
                document.getElementById('run-btn').disabled = false;
                progCont.style.display = 'none';

            } catch (e) {
                debug(`INITIALIZATION_FAILED: ${e.message}`, true);
                initBtn.disabled = false;
            }
        };

        document.getElementById('run-btn').onclick = async () => {
            const text = document.getElementById('user-input').value;
            if(!text) return;

            try {
                document.getElementById('run-btn').disabled = true;
                output.textContent = "THINKING...";
                debug("Inference cycle started.");

                await generator(text, {
                    max_new_tokens: 1024,
                    temperature: 0.8,
                    do_sample: true,
                    top_k: 40,
                    callback_function: (beams) => {
                        const decoded = generator.tokenizer.decode(beams[0].output_token_ids, { skip_special_tokens: true });
                        output.textContent = decoded;
                    }
                });

                debug("Inference cycle complete.");
            } catch (e) {
                debug(`RUNTIME_ERROR: ${e.message}`, true);
            } finally {
                document.getElementById('run-btn').disabled = false;
            }
        };

        debug("System Online. Awaiting Manual Trigger.");
    </script>
</body>
</html>
