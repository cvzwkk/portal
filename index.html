<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Neural Parser</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --line: #00ff41; --bg: #0a0a0a; --panel: #161b22; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        
        .header { border-bottom: 1px solid var(--line); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .mode-badge { font-family: monospace; font-size: 12px; padding: 4px 8px; border: 1px solid var(--line); color: var(--line); }

        .container { display: grid; grid-template-columns: 1fr; gap: 20px; flex-grow: 1; overflow: hidden; }
        @media (min-width: 900px) { .container { grid-template-columns: 1fr 1fr; } }

        textarea, .output-render { width: 100%; height: 100%; background: #000; color: #fff; border: 1px solid #30363d; border-radius: 6px; padding: 15px; box-sizing: border-box; font-family: 'Fira Code', monospace; font-size: 14px; overflow-y: auto; }
        .output-render { background: var(--panel); white-space: pre-wrap; }

        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; }
        
        button { flex: 1; padding: 12px; background: transparent; color: var(--line); border: 1px solid var(--line); font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: var(--line); color: #000; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #console { height: 100px; background: #000; border: 1px solid #333; padding: 8px; font-size: 11px; font-family: monospace; color: #888; overflow-y: auto; margin-top: 10px; }
        #progress-bar { height: 2px; background: var(--line); width: 0%; transition: 0.3s; margin-top: 5px; }
        
        /* Markdown/Latex Specific Styling */
        .output-render h1, .output-render h2 { color: var(--line); border-bottom: 1px solid #333; }
        .latex-block { display: block; background: #1c1c1c; padding: 10px; border-left: 3px solid var(--line); margin: 10px 0; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; color: var(--line);">HYBRID_PARSER v1.0</h2>
        <div class="mode-badge" id="ai-status">AI_OFFLINE</div>
    </div>

    <div class="controls">
        <div class="btn-group">
            <button id="load-ai-btn">Initialize AI Layer</button>
            <button id="regex-btn">Quick Fix (Regex Only)</button>
            <button id="hybrid-btn" disabled>Hybrid Processing</button>
        </div>
        <div id="progress-bar"></div>
    </div>

    <div class="container">
        <textarea id="input-text" placeholder="Paste messy text with [ LaTeX ] or ( LaTeX ) here..."></textarea>
        <div id="output-render" class="output-render">Output will appear here...</div>
    </div>

    <div id="console"></div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        const consoleLog = document.getElementById('console');
        const output = document.getElementById('output-render');
        const input = document.getElementById('input-text');
        const progBar = document.getElementById('progress-bar');
        
        let aiPipe = null;

        function log(msg) {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleLog.appendChild(div);
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        // --- Core 1: Regex Offline Logic ---
        function applyRegexRules(text) {
            log("Applying Regex Patterns...");
            let processed = text;

            // 1. Convert [ LaTeX ] to $$ LaTeX $$
            processed = processed.replace(/\[\s*([\s\S]*?)\s*\]/g, '\n$$\n$1\n$$\n');

            // 2. Convert ( LaTeX ) to $$ LaTeX $$ if it contains math symbols
            processed = processed.replace(/\(\s*([^)]*?[\+\-\=\\\/\d_][^)]*?)\s*\)/g, ' $$ $1 $$ ');

            // 3. Fix comma and punctuation spacing
            processed = processed.replace(/\s*,\s*/g, ', ')
                                 .replace(/\s*\.\s*/g, '. ')
                                 .replace(/\s+\./g, '.')
                                 .replace(/\n{3,}/g, '\n\n'); // No overbuffer of newlines

            // 4. Handle scientific notation spacing (e.g., 10^-35)
            processed = processed.replace(/(\d+)\s*\^/g, '$1^');

            return processed.trim();
        }

        // --- Core 2: AI Loading ---
        document.getElementById('load-ai-btn').onclick = async () => {
            try {
                log("Loading distilgpt2 (Lightweight) to browser RAM...");
                document.getElementById('load-ai-btn').disabled = true;
                
                aiPipe = await pipeline('text-generation', 'Xenova/distilgpt2', {
                    progress_callback: (p) => {
                        if(p.status === 'progress') progBar.style.width = `${p.progress}%`;
                    }
                });

                document.getElementById('ai-status').textContent = "AI_ONLINE";
                document.getElementById('ai-status').style.background = "#002200";
                document.getElementById('hybrid-btn').disabled = false;
                log("AI Layer active. Ready for hybrid pass.");
            } catch (e) {
                log("AI Load Failed: " + e.message);
                document.getElementById('load-ai-btn').disabled = false;
            }
        };

        // --- Core 3: Execution ---
        async function runHybrid() {
            let raw = input.value;
            if(!raw) return;

            // Step 1: Regex Pass (Structure)
            let step1 = applyRegexRules(raw);
            
            // Step 2: AI Pass (Coherence) - if available
            if(aiPipe) {
                log("Running AI Context Refinement...");
                const aiResult = await aiPipe(`Fix grammar and format into categories:\n${step1}`, {
                    max_new_tokens: 128,
                    temperature: 0.5,
                    do_sample: false
                });
                step1 = aiResult[0].generated_text;
            }

            // Render with Marked.js
            output.innerHTML = marked.parse(step1);
            log("Process Complete.");
        }

        document.getElementById('regex-btn').onclick = () => {
            const fixed = applyRegexRules(input.value);
            output.innerHTML = marked.parse(fixed);
        };

        document.getElementById('hybrid-btn').onclick = runHybrid;

        log("System standby. Mode: Offline Regex available.");
    </script>
</body>
</html>
