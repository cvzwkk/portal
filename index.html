<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilient Mobile AI</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --primary: #238636; --warn: #d29922; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; gap: 10px; box-sizing: border-box; }
        
        .panel { background: var(--card); border: 1px solid #30363d; padding: 12px; border-radius: 8px; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        
        select, input, textarea { flex: 1; background: #010409; color: white; border: 1px solid #30363d; padding: 10px; border-radius: 6px; font-size: 14px; }
        
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-reset { background: #8b1111; font-size: 10px; padding: 5px; }

        #progress-wrap { height: 8px; background: #30363d; border-radius: 4px; margin: 10px 0; display: none; overflow: hidden; }
        #progress-fill { height: 100%; background: #58a6ff; width: 0%; transition: width 0.2s; }

        #output-box { flex-grow: 1; background: #010409; border: 1px solid #30363d; border-radius: 6px; padding: 10px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; font-size: 13px; line-height: 1.5; }
        
        #console { height: 100px; background: black; color: #00ff41; font-family: monospace; font-size: 10px; padding: 8px; overflow-y: auto; border: 1px solid #333; }
        .log-err { color: #ff7b72; }
    </style>
</head>
<body>

    <div class="panel">
        <div class="row">
            <select id="model-select">
                <option value="onnx-community/Qwen2.5-0.5B-Instruct-ONNX">Qwen 2.5 0.5B (Small & Fast)</option>
                <option value="onnx-community/Phi-3-mini-4k-instruct-onnx-v2">Phi-3 Mini (Better Logic)</option>
                <option value="Xenova/Llama-v2-7b-chat-hf-onnx">Llama 2 (Heavy - Might Crash)</option>
            </select>
            <button class="btn-reset" onclick="clearModelCache()">CLEAR CACHE</button>
        </div>
        <input type="password" id="hf-token" placeholder="HF Token (Optional)">
        <button id="load-btn" style="width:100%; margin-top:8px;">INITIALIZE RESOURCE</button>
        
        <div id="progress-wrap">
            <div id="progress-fill"></div>
        </div>
    </div>

    <textarea id="input-box" rows="3" placeholder="Write a python script to..."></textarea>
    <button id="gen-btn" disabled>EXECUTE GENERATION</button>

    <div id="output-box">System Idle...</div>
    <div id="console"></div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        const consoleBox = document.getElementById('console');
        const outputBox = document.getElementById('output-box');
        const progFill = document.getElementById('progress-fill');
        const progWrap = document.getElementById('progress-wrap');
        const genBtn = document.getElementById('gen-btn');
        
        let generator = null;

        function log(msg, isErr = false) {
            const div = document.createElement('div');
            if(isErr) div.className = 'log-err';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleBox.appendChild(div);
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        // Global cache clearer to fix "Infinite Loading"
        window.clearModelCache = async () => {
            const dbs = await window.indexedDB.databases();
            dbs.forEach(db => window.indexedDB.deleteDatabase(db.name));
            log("CACHE PURGED. Refresh the page and try again.", true);
            alert("Cache cleared. Please refresh the page.");
        };

        document.getElementById('load-btn').onclick = async () => {
            const mId = document.getElementById('model-select').value;
            const token = document.getElementById('hf-token').value;

            try {
                log(`Bootstrapping ${mId}...`);
                document.getElementById('load-btn').disabled = true;
                progWrap.style.display = 'block';

                // Mobile Optimization Settings
                env.allowLocalModels = false;
                env.useBrowserCache = true; 
                if(token) env.remoteToken = token;

                generator = await pipeline('text-generation', mId, {
                    progress_callback: (d) => {
                        if(d.status === 'progress') {
                            progFill.style.width = `${d.progress}%`;
                            if(d.file.endsWith('.onnx')) log(`Loading Engine: ${Math.round(d.progress)}%`);
                        }
                        if(d.status === 'ready') log(`Fragment ${d.file} integrated.`);
                    }
                });

                log('CORE READY. Hardware handshake complete.');
                genBtn.disabled = false;
                outputBox.textContent = "Awaiting instructions...";
                progWrap.style.display = 'none';

            } catch (e) {
                log(`CRITICAL ERROR: ${e.message}`, true);
                document.getElementById('load-btn').disabled = false;
            }
        };

        genBtn.onclick = async () => {
            const input = document.getElementById('input-box').value;
            if(!input) return;

            try {
                genBtn.disabled = true;
                outputBox.textContent = "Generating...";
                log("Processing request via local device capability...");

                const result = await generator(input, {
                    max_new_tokens: 512,
                    temperature: 0.9,
                    do_sample: true,
                    top_k: 30,
                    callback_function: (beams) => {
                        const decoded = generator.tokenizer.decode(beams[0].output_token_ids, {
                            skip_special_tokens: true
                        });
                        outputBox.textContent = decoded;
                        outputBox.scrollTop = outputBox.scrollHeight;
                    }
                });

                log("Generation cycle complete.");
            } catch (e) {
                log(`EXECUTION ERROR: ${e.message}`, true);
            } finally {
                genBtn.disabled = false;
            }
        };

        log("Hyper-v2 Layer Online.");
    </script>
</body>
</html>
