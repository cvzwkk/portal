<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quantum Universal Navigator</title>
  <style>
    :root {
      --bg: #000;
      --text: #00f0ff;
      --accent: #00b0ff;
      --glow: 0 0 8px rgba(0, 180, 255, 0.5);
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Roboto", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      background: linear-gradient(135deg, #000020, #000520);
      padding: 1rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--accent);
      box-shadow: var(--glow);
      width: 90%;
      max-width: 600px;
    }

    header h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.1rem;
      text-shadow: 0 0 8px var(--accent);
    }

    header p {
      margin: 0.4rem 0 0;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .centered-btn {
      margin-top: 2rem;
    }

    .gravifluid-btn {
      padding: 1rem 2rem;
      background: rgba(10, 50, 100, 0.4);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(0, 120, 200, 0.3);
    }

    .gravifluid-btn:hover {
      background: rgba(0, 120, 200, 0.6);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 150, 230, 0.5);
    }

    footer {
      margin-top: auto;
      padding: 0.8rem 1rem;
      text-align: center;
      font-size: 0.8rem;
      color: #4a4a4a;
      border-top: 1px solid #004;
      width: 100%;
      max-width: 600px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Quantum Knowledge Portal</h1>
    <p>Access specialized theories with one click</p>
  </header>

  <div class="centered-btn">
    <button id="gravifluid-btn" class="gravifluid-btn">
      Gravifluids
    </button>
  </div>

  <footer>
    Quantum Knowledge Portal © 2026 — Theory Navigation
  </footer>

  <script>
    document.getElementById("gravifluid-btn").onclick = () => {
      const href = "assets/docs/knowledges/theories/Gravifluid/std1/index.html";
      window.open(href, "_blank");
    };
  </script>

</body>
</html>
