<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile AI Runner</title>
    <style>
        :root {
            --bg: #0b0e14;
            --panel: #161b22;
            --text: #c9d1d9;
            --accent: #238636;
            --debug: #00ff41;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Settings Panel */
        .card {
            background: var(--panel);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        select, input, textarea {
            width: 100%;
            background: #0d1117;
            color: white;
            border: 1px solid #30363d;
            padding: 10px;
            border-radius: 5px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
        }

        button:disabled { opacity: 0.4; }

        /* Progress Bar */
        #progress-wrap {
            height: 6px;
            background: #30363d;
            border-radius: 3px;
            margin: 10px 0;
            display: none;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            background: #58a6ff;
            width: 0%;
            transition: width 0.2s;
        }

        /* Chat Areas */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            overflow: hidden;
        }

        textarea { font-size: 16px; } /* Prevent mobile zoom */
        #output-box {
            flex-grow: 1;
            background: #0d1117;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #30363d;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
        }

        /* Debug Console */
        #debug-console {
            height: 120px;
            background: black;
            color: var(--debug);
            font-family: monospace;
            font-size: 10px;
            padding: 8px;
            overflow-y: auto;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="card">
        <label>Select Model (Lightweight)</label>
        <select id="model-select">
            <option value="Xenova/Qwen1.5-0.5B-Chat">Qwen 1.5 0.5B (Fastest)</option>
            <option value="Xenova/phi-1_5_dev">Phi 1.5 (High Logic)</option>
            <option value="Xenova/TinyLlama-1.1B-Chat-v1.0">TinyLlama 1.1B</option>
            <option value="Xenova/LaMini-Flan-T5-77M">LaMini 77M (Ultra Light)</option>
        </select>
        
        <input type="password" id="hf-token" placeholder="HuggingFace Token (Optional)">
        
        <button id="load-btn">LOAD MODEL</button>

        <div id="progress-wrap">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div class="chat-container">
        <textarea id="input-box" rows="3" placeholder="Ask something..."></textarea>
        <button id="send-btn" disabled>GENERATE RESPONSE</button>
        <div id="output-box">Waiting for model...</div>
    </div>

    <div id="debug-console"></div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        const consoleBox = document.getElementById('debug-console');
        const outputBox = document.getElementById('output-box');
        const progressFill = document.getElementById('progress-fill');
        const progressWrap = document.getElementById('progress-wrap');
        
        let generator = null;

        // Custom Logger Function
        function log(msg, type = 'EVENT') {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.textContent = `[${time}] [${type}] ${msg}`;
            consoleBox.appendChild(entry);
            consoleBox.scrollTop = consoleBox.scrollHeight;
            console.log(`[${type}] ${msg}`);
        }

        // --- Load Model Logic ---
        document.getElementById('load-btn').onclick = async () => {
            const modelId = document.getElementById('model-select').value;
            const token = document.getElementById('hf-token').value;
            
            try {
                log(`Initializing ${modelId}...`, 'INIT');
                progressWrap.style.display = 'block';
                document.getElementById('load-btn').disabled = true;

                if(token) env.remoteToken = token;

                generator = await pipeline('text-generation', modelId, {
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            progressFill.style.width = `${data.progress}%`;
                            log(`Downloading ${data.file}: ${data.progress.toFixed(1)}%`, 'LOAD');
                        }
                    }
                });

                log('Model loaded and ready!', 'SUCCESS');
                document.getElementById('send-btn').disabled = false;
                outputBox.textContent = "Model ready. Type below to chat.";
                progressWrap.style.display = 'none';

            } catch (e) {
                log(e.message, 'ERROR');
                document.getElementById('load-btn').disabled = false;
            }
        };

        // --- Generation Logic ---
        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('input-box').value;
            if (!input) return;

            try {
                document.getElementById('send-btn').disabled = true;
                outputBox.textContent = "";
                log('Generating response...', 'TASK');

                let fullText = "";
                const result = await generator(input, {
                    max_new_tokens: 512,
                    temperature: 0.7,
                    callback_function: (beams) => {
                        // Stream output to the box
                        const decoded = generator.tokenizer.decode(beams[0].output_token_ids, {
                            skip_special_tokens: true
                        });
                        outputBox.textContent = decoded;
                        outputBox.scrollTop = outputBox.scrollHeight;
                    }
                });

                log('Generation finished.', 'SUCCESS');
            } catch (e) {
                log(e.message, 'ERROR');
            } finally {
                document.getElementById('send-btn').disabled = false;
            }
        };

        log('System online. Awaiting user command.');
    </script>
</body>
</html>
