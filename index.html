<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Markdown & LaTeX Optimizer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">

    <style>
        :root {
            --bg: #0d1117;
            --panel-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #238636;
        }

        body {
            font-family: -apple-system, system-ui, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .app-header {
            padding: 1rem 2rem;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
            overflow: hidden;
            gap: 1px;
            background: var(--border);
        }

        .column {
            display: flex;
            flex-direction: column;
            background: var(--bg);
            overflow: hidden;
        }

        .column-header {
            padding: 10px 20px;
            background: var(--panel-bg);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            flex: 1;
            background: var(--bg);
            color: var(--text);
            border: none;
            padding: 20px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            resize: none;
        }

        #preview-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #ffffff; /* White background for true GitHub preview */
            color: #24292f;
        }

        .toolbar {
            padding: 15px 20px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 15px;
        }

        button {
            background: var(--accent);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #2ea043; }
        button.secondary { background: transparent; border: 1px solid var(--border); }
        button.secondary:hover { border-color: #8b949e; }

        .stats { font-size: 11px; color: #8b949e; }
    </style>
</head>
<body>

<div class="app-header">
    <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 1.5rem;">🚀</span>
        <strong style="font-size: 1.1rem;">ULTRA Markdown Optimizer</strong>
    </div>
    <div class="stats" id="char-count">0 Characters processed</div>
</div>

<div class="main-container">
    <div class="column">
        <div class="column-header">Input Source (Raw / Messy)</div>
        <textarea id="editor" placeholder="Paste your messy text, messy LaTeX (\(\alpha\)), or unformatted markdown here..."></textarea>
    </div>

    <div class="column">
        <div class="column-header">GitHub Render View (Simulated)</div>
        <div id="preview-area" class="markdown-body"></div>
    </div>
</div>

<div class="toolbar">
    <button onclick="optimizeContent()">✨ Run Global Optimization</button>
    <button class="secondary" onclick="copyToClipboard()">📋 Copy Optimized .md</button>
    <button class="secondary" onclick="downloadFile()">💾 Download .md</button>
    <button class="secondary" style="margin-left: auto; color: #ff7b72;" onclick="document.getElementById('editor').value=''">Clear</button>
</div>

<script>
    function optimizeContent() {
        let text = document.getElementById('editor').value;
        if (!text.trim()) return;

        // --- STEP 1: PROTECT CODE BLOCKS ---
        const codeBlocks = [];
        text = text.replace(/```[\s\S]*?```/g, (match) => {
            codeBlocks.push(match);
            return `__CODE_BLOCK_${codeBlocks.length - 1}__`;
        });

        // --- STEP 2: GLOBAL LATEX REPAIR ENGINE ---
        // Handles: (\ , (\( , \( , \[ , [[ , and variants
        const openPatterns = /(\(\s?\\|\(\s?\(|\\\[|\\\s?\(|\[\s?\[|\[\s?\\)/g;
        text = text.replace(openPatterns, '\n\n$$$$\\[\n');

        // Handles: \) , \) ) , \] , ]] , ] )
        const closePatterns = /(\\\s?\)|\\\]|\]\s?\]|\\\s?\]|\)\s?\s?\)\s?|\]\s?\))/g;
        text = text.replace(closePatterns, '\n\\]$$$$\n\n');

        // Fix potential $$$$ artifacting
        text = text.replace(/\${4}/g, '$$');

        // --- STEP 3: MARKDOWN FORMATTING UPGRADE ---
        
        // Clean "Detentation" - leading spaces on lines that aren't lists
        text = text.split('\n').map(line => {
            return line.replace(/^\s+(?![*-]|\d\.)/, ''); 
        }).join('\n');

        // Header Standardization: #Title -> # Title
        text = text.replace(/^(#+)([A-Za-z0-9])/gm, '$1 $2');

        // Punctuation Spacing Logic
        text = text.replace(/\s+([,.!?;:])/g, '$1');

        // Correct Lowercase 'i' at start of sentences
        text = text.replace(/(^|[.!?]\s+)(i)(?=\s)/g, (m, p1, p2) => p1 + "I");

        // Ensure exactly one blank line between paragraphs
        text = text.replace(/\n{3,}/g, '\n\n');

        // --- STEP 4: RESTORE CODE BLOCKS ---
        codeBlocks.forEach((block, i) => {
            text = text.replace(`__CODE_BLOCK_${i}__`, block);
        });

        // --- STEP 5: OUTPUT & RENDER ---
        document.getElementById('editor').value = text;
        
        const preview = document.getElementById('preview-area');
        preview.innerHTML = marked.parse(text);
        
        document.getElementById('char-count').innerText = `${text.length} Characters processed`;

        // Trigger MathJax
        if (window.MathJax) {
            MathJax.typesetPromise([preview]);
        }
    }

    function copyToClipboard() {
        const text = document.getElementById('editor').value;
        navigator.clipboard.writeText(text).then(() => alert("Optimized Markdown copied!"));
    }

    function downloadFile() {
        const text = document.getElementById('editor').value;
        const blob = new Blob([text], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "README_OPTIMIZED.md";
        a.click();
    }

    // Live update preview on change (Optional, can be CPU heavy)
    let timeout = null;
    document.getElementById('editor').addEventListener('input', () => {
        clearTimeout(timeout);
        timeout = setTimeout(optimizeContent, 1000);
    });
</script>

</body>
</html>
