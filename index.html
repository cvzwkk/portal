<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Architect v3.0 | Debug Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">

    <style>
        :root {
            --bg: #010409; --panel: #0d1117; --border: #30363d;
            --text: #e6edf3; --accent: #238636; --debug-text: #7ee787;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text); margin: 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* Progress Bar */
        #progress-container { width: 100%; height: 4px; background: #21262d; position: fixed; top: 0; z-index: 1000; }
        #progress-bar { width: 0%; height: 100%; background: #2f81f7; transition: width 0.4s ease; box-shadow: 0 0 10px #2f81f7; }

        /* Header */
        header { padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .meta-data { font-size: 12px; font-family: monospace; color: #8b949e; }

        /* Main Layout */
        main { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; background: var(--border); gap: 1px; }
        .column { display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
        .label-bar { padding: 8px 15px; background: var(--panel); font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; }

        /* Editor & Preview */
        textarea { flex: 1; background: var(--bg); color: var(--text); border: none; padding: 20px; font-family: 'SFMono-Regular', monospace; font-size: 13px; outline: none; resize: none; line-height: 1.6; }
        #preview { flex: 1; padding: 30px; overflow-y: auto; background: #ffffff; color: #1f2328; }

        /* Debug Console */
        #console {
            height: 150px; background: #000; border-top: 1px solid var(--border);
            padding: 10px 20px; font-family: 'SFMono-Regular', monospace; font-size: 11px;
            color: var(--debug-text); overflow-y: scroll; line-height: 1.4;
        }
        .log-entry { margin-bottom: 4px; }
        .log-time { color: #8b949e; margin-right: 8px; }

        /* Footer Controls */
        footer { padding: 15px 20px; background: var(--panel); border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
        button { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        button:disabled { background: #21262d; color: #484f58; cursor: wait; }
        .btn-sec { background: #30363d; }
        
        #timer { font-family: monospace; font-size: 12px; color: #f0883e; margin-left: auto; }
    </style>
</head>
<body>

<div id="progress-container"><div id="progress-bar"></div></div>

<header>
    <div>🛰️ <strong>SWARM OS</strong> <span class="meta-data">| LITE-MODEL-WASM</span></div>
    <div class="meta-data" id="model-info">Model: Initializing...</div>
</header>

<main>
    <div class="column">
        <div class="label-bar">INPUT TERMINAL</div>
        <textarea id="editor" placeholder="Paste messy equations $E=mc^2$ or [a+b] fragments here..."></textarea>
    </div>
    <div class="column">
        <div class="label-bar">GITHUB RENDER (HUMAN READABLE)</div>
        <div id="preview" class="markdown-body"></div>
    </div>
</main>

<div id="console">
    <div class="log-entry"><span class="log-time">[00:00:00]</span> SYSTEM: Booting Swarm Modules...</div>
</div>

<footer>
    <button id="run-btn" onclick="runSwarmSequence()" disabled>EXECUTE SWARM</button>
    <button class="btn-sec" onclick="copyText()">📋 COPY</button>
    <button class="btn-sec" onclick="downloadMD()">💾 SAVE .md</button>
    <div id="timer">LATENCY: 0.000s</div>
</footer>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    let generator = null;
    const editor = document.getElementById('editor');
    const progressBar = document.getElementById('progress-bar');
    const debugConsole = document.getElementById('console');
    const timerDisplay = document.getElementById('timer');
    const statusInfo = document.getElementById('model-info');

    // --- DEBUG LOGGING ENGINE ---
    function log(msg, type = 'INFO') {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const now = new Date().toLocaleTimeString('en-GB', { hour12: false });
        entry.innerHTML = `<span class="log-time">[${now}]</span> <span style="color:${type === 'ERR' ? '#ff7b72' : '#7ee787'}">${type}:</span> ${msg}`;
        debugConsole.appendChild(entry);
        debugConsole.scrollTop = debugConsole.scrollHeight;
    }

    // --- INITIALIZE AI ---
    async function initSwarm() {
        try {
            log("Downloading Neural Weights (~150MB)...");
            progressBar.style.width = "30%";
            generator = await pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct');
            progressBar.style.width = "100%";
            setTimeout(() => progressBar.style.width = "0%", 500);
            
            log("Neural Engine Online. Agents Synced.");
            statusInfo.innerText = "Model: SmolLM-135M (READY)";
            document.getElementById('run-btn').disabled = false;
        } catch (err) {
            log("Initialization Failed: " + err.message, "ERR");
        }
    }
    initSwarm();

    // --- HYBRID SWARM LOGIC ---
    window.runSwarmSequence = async () => {
        const input = editor.value;
        if (!input) return;

        const startTime = performance.now();
        document.getElementById('run-btn').disabled = true;
        log("Swarm Sequence Initiated.");
        progressBar.style.width = "10%";

        // 1. Regex Agent (Pre-processor)
        log("Agent [LATEX]: Sanitizing shattered fragments...");
        let text = input.replace(/(\$\$[\s\S]*?\[|\\\[)([\s\S]*?)(\]|\$\$)/g, '\n\n$$\n$2\n$$\n\n');
        text = text.replace(/(^|[^\$])\$([^\$]+?)\$([^\$]|$)/g, '$1\n\n$$\n$2\n$$\n\n');
        progressBar.style.width = "40%";

        // 2. AI Evolution Agent (Logic & Grammar)
        log("Agent [EVOLVER]: Generating structural categories...");
        const prompt = `<|im_start|>system\nOrganize into GitHub Markdown. Fix grammar/punctuation. Use $$ for all equations.<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant`;
        
        try {
            const output = await generator(prompt, { max_new_tokens: 500, temperature: 0.2 });
            let result = output[0].generated_text.split('<|im_start|>assistant')[1] || output[0].generated_text;
            
            editor.value = result.trim();
            progressBar.style.width = "80%";
            
            // 3. Render Agent
            log("Agent [RENDER]: Interpreting MathJax & Markdown...");
            render();
            
            const endTime = performance.now();
            const latency = ((endTime - startTime) / 1000).toFixed(3);
            timerDisplay.innerText = `LATENCY: ${latency}s`;
            log(`Sequence Complete. Total Latency: ${latency}s`);
        } catch (err) {
            log("Swarm Failure: " + err.message, "ERR");
        } finally {
            progressBar.style.width = "100%";
            setTimeout(() => progressBar.style.width = "0%", 400);
            document.getElementById('run-btn').disabled = false;
        }
    };

    function render() {
        document.getElementById('preview').innerHTML = marked.parse(editor.value);
        if (window.MathJax) MathJax.typesetPromise();
    }

    // --- UTILITIES ---
    window.copyText = () => {
        navigator.clipboard.writeText(editor.value);
        log("Clipboard: Text Captured.");
    };

    window.downloadMD = () => {
        const blob = new Blob([editor.value], {type: 'text/markdown'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = "swarm_output.md"; a.click();
        log("System: README.md generated and downloaded.");
    };

    editor.addEventListener('input', () => {
        render();
        timerDisplay.innerText = "LATENCY: 0.000s";
    });

    window.MathJax = { tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] } };
</script>

</body>
</html>
