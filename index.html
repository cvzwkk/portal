<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile AI Runner</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/font/lucide.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --primary: #3b82f6;
            --accent: #10b981;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 800px;
            margin: auto;
        }

        .section {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label { font-size: 0.85rem; font-weight: 600; color: #94a3b8; }

        select, input, textarea {
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #progress-container {
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }

        #progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
            font-size: 14px;
            line-height: 1.5;
        }

        #console {
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            border-radius: 6px;
            white-space: pre-wrap;
            border: 1px solid #334155;
        }

        .status-tag {
            font-size: 10px;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
            background: #334155;
            align-self: flex-start;
        }
    </style>
</head>
<body>

    <div class="section">
        <label>Configuration</label>
        <select id="model-select">
            <option value="Xenova/Qwen1.5-0.5B-Chat">Qwen 1.5 (0.5B) - Fastest</option>
            <option value="Xenova/phi-1_5_dev">Phi 1.5 - High Quality</option>
            <option value="Xenova/LaMini-Flan-T5-77M">LaMini 77M - Super Light</option>
            <option value="Xenova/gpt2">GPT-2 (Classic)</option>
        </select>
        <input type="password" id="hf-token" placeholder="HuggingFace Token (Optional for public models)">
        <button id="load-btn">Initialize Model</button>
        
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="load-status" class="status-tag">Ready</div>
    </div>

    <div class="section">
        <label>Input</label>
        <textarea id="input-text" placeholder="Type your prompt here..."></textarea>
        <button id="gen-btn" disabled>Generate Output</button>
    </div>

    <div class="section">
        <label>Output</label>
        <textarea id="output-text" readonly placeholder="Result will appear here..."></textarea>
    </div>

    <div class="section">
        <label>Debug Console</label>
        <div id="console"></div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        // Elements
        const consoleEl = document.getElementById('console');
        const loadBtn = document.getElementById('load-btn');
        const genBtn = document.getElementById('gen-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const outputText = document.getElementById('output-text');
        const inputText = document.getElementById('input-text');
        const modelSelect = document.getElementById('model-select');
        const hfToken = document.getElementById('hf-token');
        const loadStatus = document.getElementById('load-status');

        let generator = null;

        // --- Debug Console Interceptor ---
        const log = (msg, type = 'INFO') => {
            const time = new Date().toLocaleTimeString().split(' ')[0];
            const line = document.createElement('div');
            line.textContent = `[${time}] [${type}] ${msg}`;
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
            console.log(`[${type}] ${msg}`);
        };

        // Catch global errors
        window.onerror = (m, s, l, c, e) => log(`${m} at ${l}:${c}`, 'ERROR');

        // --- Model Management ---
        loadBtn.onclick = async () => {
            const modelId = modelSelect.value;
            const token = hfToken.value;
            
            try {
                loadBtn.disabled = true;
                progressContainer.style.display = 'block';
                log(`Starting download/load for ${modelId}...`);
                loadStatus.textContent = "Loading...";

                // Configure environment for mobile/browser
                env.allowLocalModels = false;
                if(token) env.remoteToken = token;

                generator = await pipeline('text-generation', modelId, {
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            progressBar.style.width = `${data.progress}%`;
                            log(`Downloading ${data.file}: ${Math.round(data.progress)}%`, 'DL');
                        } else if (data.status === 'done') {
                            log(`Finished downloading ${data.file}`, 'DL');
                        }
                    }
                });

                log('Model loaded successfully!', 'SUCCESS');
                loadStatus.textContent = "Loaded";
                loadStatus.style.background = "#10b981";
                genBtn.disabled = false;
                progressContainer.style.display = 'none';

            } catch (err) {
                log(err.message, 'ERROR');
                loadBtn.disabled = false;
                loadStatus.textContent = "Error";
            }
        };

        // --- Generation ---
        genBtn.onclick = async () => {
            const prompt = inputText.value;
            if (!prompt) return log('Input is empty', 'WARN');

            try {
                genBtn.disabled = true;
                outputText.value = "Generating...";
                log('Processing generation request...');

                const start = performance.now();
                const result = await generator(prompt, { 
                    max_new_tokens: 256,
                    temperature: 0.7,
                    callback_function: (beams) => {
                        // This updates the UI as the model "thinks"
                        const decoded = generator.tokenizer.decode(beams[0].output_token_ids, { skip_special_tokens: true });
                        outputText.value = decoded;
                    }
                });

                const end = performance.now();
                log(`Generation complete in ${((end - start)/1000).toFixed(2)}s`, 'SUCCESS');
                
            } catch (err) {
                log(err.message, 'ERROR');
            } finally {
                genBtn.disabled = false;
            }
        };

        log('System initialized. Select a model and click Load.');
    </script>
</body>
</html>
