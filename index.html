<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Markdown & LaTeX Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --glow: #00ff41; --bg: #050505; --panel: #111; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #e0e0e0; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        
        /* Terminal UI styling */
        .terminal-container { border: 1px solid var(--glow); background: var(--panel); padding: 15px; border-radius: 4px; box-shadow: 0 0 15px rgba(0,255,65,0.1); }
        .status-bar { font-family: monospace; font-size: 11px; margin-bottom: 10px; color: var(--glow); display: flex; justify-content: space-between; }
        
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 4px; font-family: inherit; margin-bottom: 10px; resize: none; box-sizing: border-box; }
        textarea:focus { border-color: var(--glow); outline: none; }
        
        button { background: transparent; color: var(--glow); border: 1px solid var(--glow); padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.3s; }
        button:hover:not(:disabled) { background: var(--glow); color: #000; }
        button:disabled { opacity: 0.3; cursor: wait; }

        /* Output & Console */
        #markdown-render { flex-grow: 1; border: 1px solid #333; margin-top: 15px; padding: 20px; overflow-y: auto; background: #0d0d0d; line-height: 1.6; border-radius: 4px; }
        #markdown-render h1, h2 { border-bottom: 1px solid #333; padding-bottom: 5px; color: var(--glow); }
        #markdown-render code { background: #222; padding: 2px 4px; border-radius: 3px; font-family: monospace; }
        
        #debug-console { height: 130px; border-top: 2px solid #222; margin-top: 10px; padding: 10px; overflow-y: scroll; font-family: monospace; font-size: 11px; background: #000; color: #888; }
        #debug-console::-webkit-scrollbar { width: 6px; }
        #debug-console::-webkit-scrollbar-thumb { background: #333; }
        .log-ev { color: #58a6ff; }
        .log-err { color: #ff5555; }
        
        #progress-bar { height: 3px; background: var(--glow); width: 0%; transition: width 0.2s; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="status-bar">
            <span>ENGINE: Xenova/distilgpt2</span>
            <span id="load-state">OFFLINE</span>
        </div>
        <input type="password" id="hf-token" placeholder="HF_TOKEN (Optional)" style="width:100%; background:#000; color:#fff; border:1px solid #333; padding:8px; margin-bottom:10px; box-sizing:border-box;">
        <button id="load-btn">Download & Initialize Engine</button>
        <div id="progress-bar"></div>
    </div>

    <textarea id="prompt-input" rows="3" placeholder="Enter text or math query..."></textarea>
    <button id="gen-btn" disabled>Generate Markdown Output</button>

    <div id="markdown-render">Awaiting hardware handshake...</div>
    <div id="debug-console"></div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        const debugBox = document.getElementById('debug-console');
        const outputBox = document.getElementById('markdown-render');
        const progBar = document.getElementById('progress-bar');
        const loadState = document.getElementById('load-state');
        
        let pipe = null;

        function log(msg, type = '') {
            const div = document.createElement('div');
            if(type) div.className = `log-${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            debugBox.appendChild(div);
            debugBox.scrollTop = debugBox.scrollHeight;
        }

        // --- Model Initialization ---
        document.getElementById('load-btn').onclick = async () => {
            const token = document.getElementById('hf-token').value;
            try {
                log("Initializing DistilGPT2 Architecture...", "ev");
                document.getElementById('load-btn').disabled = true;
                
                if(token) env.remoteToken = token;
                env.allowLocalModels = false;

                pipe = await pipeline('text-generation', 'Xenova/distilgpt2', {
                    progress_callback: (p) => {
                        if(p.status === 'progress') {
                            progBar.style.width = `${p.progress}%`;
                            log(`Downloading Fragment: ${Math.round(p.progress)}%`);
                        }
                    }
                });

                log("Neural Engine Online.", "ev");
                loadState.textContent = "ONLINE / READY";
                loadState.style.color = "#00ff41";
                document.getElementById('gen-btn').disabled = false;
                outputBox.textContent = "System ready. Input text for Markdown processing.";

            } catch (e) {
                log(`Auth/Fetch Error: ${e.message}`, "err");
                document.getElementById('load-btn').disabled = false;
            }
        };

        // --- Generation & Formatting ---
        document.getElementById('gen-btn').onclick = async () => {
            const input = document.getElementById('prompt-input').value;
            if(!input) return;

            try {
                document.getElementById('gen-btn').disabled = true;
                outputBox.innerHTML = "<em>Processing Neural Syntax...</em>";
                log("Executing generation cycle...");

                const result = await pipe(input, {
                    max_new_tokens: 256,
                    temperature: 0.7,
                    repetition_penalty: 1.2,
                    do_sample: true,
                    callback_function: (beams) => {
                        let rawText = pipe.tokenizer.decode(beams[0].output_token_ids, { skip_special_tokens: true });
                        
                        // Autonomous Formatting Layer
                        // 1. Fix spacing/indentation
                        let formatted = rawText.replace(/\s+/g, ' ').trim();
                        
                        // 2. Encapsulate LaTeX-style formulas found in text
                        // Looks for patterns like a^2 + b^2 = c^2 and wraps them
                        formatted = formatted.replace(/([a-zA-Z0-9\^_\+\-\*\/\=\(\)]+\s?[\=\+\-]\s?[a-zA-Z0-9\^_\+\-\*\/\=\(\)]+)/g, ' $$ $1 $$ ');
                        
                        // 3. Convert to Markdown
                        outputBox.innerHTML = marked.parse(formatted);
                    }
                });

                log("Cycle complete. Syntax sanitized.", "ev");
            } catch (e) {
                log(`Runtime Exception: ${e.message}`, "err");
            } finally {
                document.getElementById('gen-btn').disabled = false;
            }
        };

        log("Interface initialized. Xenova/distilgpt2 standby.");
    </script>
</body>
</html>
