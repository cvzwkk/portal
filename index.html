<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Neural Runner</title>
    <style>
        :root { --bg: #010409; --card: #0d1117; --text: #e6edf3; --glow: #238636; --fail: #f85149; }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; box-sizing: border-box; }
        
        /* GUI Layout */
        .panel { background: var(--card); border: 1px solid #30363d; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        
        select, input, textarea { width: 100%; background: #000; color: #39ff14; border: 1px solid #333; padding: 12px; border-radius: 4px; font-size: 14px; }
        
        button { flex: 1; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; border: none; text-transform: uppercase; transition: 0.2s; }
        .btn-load { background: #1f6feb; color: white; }
        .btn-force { background: #8957e5; color: white; }
        .btn-gen { background: var(--glow); color: white; margin-top: 10px; }
        button:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        /* Progress & Console */
        #progress-wrap { height: 4px; background: #161b22; margin-top: 10px; border-radius: 2px; display: none; overflow: hidden; }
        #progress-fill { height: 100%; background: #58a6ff; width: 0%; transition: width 0.1s; }

        #output-area { flex-grow: 1; background: #000; border: 1px solid #30363d; padding: 15px; overflow-y: auto; white-space: pre-wrap; color: #fff; font-size: 14px; line-height: 1.6; border-radius: 4px; }
        
        /* Custom Scrollbar Debug Console */
        #debug-console { height: 120px; background: #000; color: #888; font-size: 11px; padding: 10px; overflow-y: scroll; border-top: 2px solid #30363d; margin-top: 10px; }
        #debug-console::-webkit-scrollbar { width: 8px; }
        #debug-console::-webkit-scrollbar-track { background: #050505; }
        #debug-console::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        #debug-console::-webkit-scrollbar-thumb:hover { background: #444; }

        .log-sys { color: #58a6ff; }
        .log-work { color: #39ff14; }
        .log-err { color: var(--fail); }
    </style>
</head>
<body>

    <div class="panel">
        <div class="row">
            <select id="model-select">
                <option value="onnx-community/Qwen2.5-0.5B-Instruct-ONNX">Qwen 2.5 (Fastest)</option>
                <option value="onnx-community/Phi-3-mini-4k-instruct-onnx-v2">Phi-3 Mini (Logic Engine)</option>
                <option value="Xenova/TinyLlama-1.1B-Chat-v1.0">TinyLlama 1.1B</option>
            </select>
            <input type="password" id="hf-token" placeholder="HF_TOKEN" style="max-width: 120px;">
        </div>
        <div class="row">
            <button id="load-btn" class="btn-load">Manual Load</button>
            <button id="force-btn" class="btn-force">Force Load (Auto-Retry)</button>
        </div>
        <div id="progress-wrap">
            <div id="progress-fill"></div>
        </div>
    </div>

    <textarea id="input-box" rows="2" placeholder="System command input..."></textarea>
    <button id="gen-btn" class="btn-gen" disabled>Execute Neural Logic</button>

    <div id="output-area">CORE_IDLE: Awaiting initialization...</div>
    
    <div id="debug-console"></div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        const models = [
            "onnx-community/Qwen2.5-0.5B-Instruct-ONNX",
            "Xenova/TinyLlama-1.1B-Chat-v1.0",
            "onnx-community/Phi-3-mini-4k-instruct-onnx-v2",
            "Xenova/Qwen1.5-0.5B-Chat"
        ];

        const consoleBox = document.getElementById('debug-console');
        const outputArea = document.getElementById('output-area');
        const progFill = document.getElementById('progress-fill');
        const progWrap = document.getElementById('progress-wrap');
        const genBtn = document.getElementById('gen-btn');
        
        let runner = null;
        let activeModelId = "";

        function log(msg, type = 'sys') {
            const div = document.createElement('div');
            div.className = `log-${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] [${type.toUpperCase()}] ${msg}`;
            consoleBox.appendChild(div);
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        async function initModel(modelId, isAuto = false) {
            try {
                progWrap.style.display = 'block';
                log(`Attempting load: ${modelId}`, 'sys');
                
                const token = document.getElementById('hf-token').value;
                if(token) env.remoteToken = token;

                runner = await pipeline('text-generation', modelId, {
                    progress_callback: (d) => {
                        if(d.status === 'progress') {
                            progFill.style.width = `${d.progress}%`;
                        }
                    }
                });

                // STRESS TEST / VALIDATION
                log(`Validating coherence for ${modelId}...`, 'sys');
                const test = await runner("Say 'READY'", { max_new_tokens: 5, temperature: 0.1 });
                const response = test[0].generated_text.toUpperCase();
                
                if(response.length > 0) {
                    log(`Model ${modelId} verified and responding.`, 'work');
                    activeModelId = modelId;
                    outputArea.textContent = `CORE_ACTIVE: ${modelId}\nSYSTEM STATUS: Ready for complex instructions.`;
                    genBtn.disabled = false;
                    progWrap.style.display = 'none';
                    return true;
                }
                return false;

            } catch (e) {
                log(`Failure on ${modelId}: ${e.message}`, 'err');
                return false;
            }
        }

        // AUTO-RETRY LOGIC
        document.getElementById('force-btn').onclick = async () => {
            document.getElementById('force-btn').disabled = true;
            log("Starting Autonomous Resource Acquisition...", "sys");

            for (const mId of models) {
                const success = await initModel(mId, true);
                if (success) {
                    log(`Auto-selection successful. Resource: ${mId}`, "work");
                    document.getElementById('model-select').value = mId;
                    break;
                }
                log(`Model ${mId} rejected. Switching resources...`, "err");
            }
            document.getElementById('force-btn').disabled = false;
        };

        // MANUAL LOAD
        document.getElementById('load-btn').onclick = () => initModel(document.getElementById('model-select').value);

        // GENERATE
        document.getElementById('gen-btn').onclick = async () => {
            const prompt = document.getElementById('input-box').value;
            if(!prompt) return;

            try {
                genBtn.disabled = true;
                outputArea.textContent = "";
                log("Executing high-entropy generation cycle...", "sys");

                // Resource Overload Settings
                await runner(prompt, {
                    max_new_tokens: 1024,
                    temperature: 1.1,      // Increased entropy
                    do_sample: true,
                    top_p: 0.9,
                    repetition_penalty: 1.2,
                    callback_function: (beams) => {
                        const decoded = runner.tokenizer.decode(beams[0].output_token_ids, { skip_special_tokens: true });
                        outputArea.textContent = decoded;
                        outputArea.scrollTop = outputArea.scrollHeight;
                    }
                });

                log("Generation sequence finalized.", "work");
            } catch (e) {
                log(`Buffer error: ${e.message}`, "err");
            } finally {
                genBtn.disabled = false;
            }
        };

        log("Neural Interface Loaded. Use Force Load if resources hang.");
    </script>
</body>
</html>
