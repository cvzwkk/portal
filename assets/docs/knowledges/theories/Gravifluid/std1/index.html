<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BN2S Universal Reality Engine</title>
    <style>
        :root { --neon: #00f2ff; --bg: #000205; --panel: rgba(0, 10, 20, 0.95); }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Consolas', monospace; color: var(--neon); }
        canvas { display: block; }

        /* The Multi-Menu Interface */
        #ui-interface {
            position: absolute; top: 20px; left: 20px; width: 340px;
            background: var(--panel); border: 1px solid #004466;
            border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(8px); z-index: 1000;
        }
        .header { background: #004466; padding: 10px; font-weight: bold; font-size: 14px; text-transform: uppercase; text-align: center; color: #fff; }
        .tabs { display: flex; border-bottom: 1px solid #004466; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 11px; opacity: 0.6; transition: 0.3s; }
        .tab:hover { opacity: 1; background: rgba(0,242,255,0.1); }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--neon); color: #fff; }
        
        .tab-content { padding: 15px; display: none; }
        .tab-content.active { display: block; }

        /* Data Readout */
        .readout { background: rgba(0,0,0,0.5); padding: 10px; margin-bottom: 10px; font-size: 12px; line-height: 1.6; border: 1px solid #111; }
        .readout span { color: #fff; }

        label { display: block; margin: 12px 0 5px; font-size: 11px; text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: crosshair; accent-color: var(--neon); }
        button { 
            width: 100%; padding: 8px; margin-top: 8px; background: transparent; 
            border: 1px solid #004466; color: var(--neon); cursor: pointer; font-family: inherit;
        }
        button:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div id="ui-interface">
    <div class="header">BN2S Universal Engine v2.0</div>
    <div class="tabs">
        <div class="tab active" onclick="setTab('epochs')">Epochs</div>
        <div class="tab" onclick="setTab('physics')">Physics</div>
        <div class="tab" onclick="setTab('events')">Events</div>
    </div>

    <div id="epochs" class="tab-content active">
        <div class="readout">
            EPOCH: <span id="epochName">Singularity</span><br>
            TIME: <span id="cosmicTime">t = 0</span><br>
            TEMP: <span id="cosmicTemp">∞ K</span>
        </div>
        <label>Timeline Progress (Cosmic Expansion)</label>
        <input type="range" id="timeline" min="0" max="1000" value="0">
        <label>Spatial Zoom (Logarithmic)</label>
        <input type="range" id="zoom" min="1" max="1000" value="100">
    </div>

    <div id="physics" class="tab-content">
        <label>Matter Density ($\Omega_m$)</label>
        <input type="range" id="density" min="0" max="100" value="30">
        <label>Dark Energy ($\Lambda$)</label>
        <input type="range" id="darkEnergy" min="0" max="100" value="70">
        <label>Planck Constant Interference</label>
        <input type="range" id="planck" min="0" max="100" value="10">
    </div>

    <div id="events" class="tab-content">
        <button onclick="triggerSupernova()">Inject Supernova</button>
        <button onclick="collapseToBlackHole()">Stellar Collapse</button>
        <button onclick="toggleGravitonFlux()">Graviton Flux Toggle</button>
        <button onclick="resetUniverse()" style="border-color: #ff3300; color: #ff3300;">Big Bang Reset</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, clock;
    let macroGroup, microGroup, quantumGroup;
    let particles, grid;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 10000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        clock = new THREE.Clock();

        macroGroup = new THREE.Group();
        microGroup = new THREE.Group();
        quantumGroup = new THREE.Group();
        scene.add(macroGroup, microGroup, quantumGroup);

        // INITIAL STATE: The Spacetime Grid (Quantum Tissue)
        createQuantumTissue();
        
        // MACRO: First Matter
        createMatterField();

        camera.position.z = 500;
    }

    function createQuantumTissue() {
        const size = 1000;
        const divisions = 50;
        grid = new THREE.GridHelper(size, divisions, 0x004466, 0x001122);
        grid.position.y = -50;
        quantumGroup.add(grid);
    }

    function createMatterField() {
        const geo = new THREE.BufferGeometry();
        const count = 15000;
        const pos = new Float32Array(count * 3);
        const col = new Float32Array(count * 3);

        for(let i=0; i<count*3; i++) {
            pos[i] = (Math.random() - 0.5) * 0.1; // Singularity
            col[i] = 1.0; 
        }

        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        const mat = new THREE.PointsMaterial({ size: 0.8, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending });
        particles = new THREE.Points(geo, mat);
        macroGroup.add(particles);
    }

    function animate() {
        requestAnimationFrame(animate);
        let time = clock.getElapsedTime();
        let timeline = document.getElementById('timeline').value / 1000;
        let zoom = document.getElementById('zoom').value / 100;

        // SCALE LOGIC (The Transition)
        if (timeline < 0.1) {
            // THE SINGULARITY / INFLATION
            updateEpoch("Planck Era", "10^-43s", "10^32 K");
            camera.position.z = 10;
            particles.scale.set(1 + timeline*100, 1 + timeline*100, 1 + timeline*100);
            grid.visible = true;
        } else if (timeline < 0.4) {
            // NUCLEOSYNTHESIS
            updateEpoch("Nucleosynthesis", "3 Minutes", "10^9 K");
            camera.position.z = 200;
            animatePlasma(timeline);
        } else {
            // STELLIFEROUS ERA
            updateEpoch("Stelliferous Era", "13.8 Billion Years", "2.73 K");
            camera.position.z = 500 / zoom;
            animateGalaxies(timeline);
        }

        // QUANTUM JITTER (Realistic Uncertainty)
        if(zoom > 5) {
            quantumGroup.visible = true;
            grid.position.y = Math.sin(time * 5) * 0.5;
        } else {
            quantumGroup.visible = false;
        }

        renderer.render(scene, camera);
    }

    function animatePlasma(t) {
        const positions = particles.geometry.attributes.position.array;
        const colors = particles.geometry.attributes.color.array;
        for(let i=0; i<positions.length; i+=3) {
            positions[i] += (Math.random() - 0.5) * 2;
            // Shift from white hot to cooling amber
            colors[i] = 1.0;
            colors[i+1] = Math.max(0, 1.0 - (t * 2));
            colors[i+2] = Math.max(0, 1.0 - (t * 3));
        }
        particles.geometry.attributes.position.needsUpdate = true;
        particles.geometry.attributes.color.needsUpdate = true;
    }

    function animateGalaxies(t) {
        particles.rotation.y += 0.001;
        // Gravity logic: points start to cluster (Simplified N-Body)
        const pos = particles.geometry.attributes.position.array;
        for(let i=0; i<pos.length; i+=3) {
            let dist = Math.sqrt(pos[i]**2 + pos[i+1]**2 + pos[i+2]**2);
            if(dist > 50) {
                pos[i] *= 1.001; // Universe Expansion (Hubble Law)
            }
        }
        particles.geometry.attributes.position.needsUpdate = true;
    }

    function updateEpoch(name, time, temp) {
        document.getElementById('epochName').innerText = name;
        document.getElementById('cosmicTime').innerText = time;
        document.getElementById('cosmicTemp').innerText = temp;
    }

    function triggerSupernova() {
        const s = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), new THREE.MeshBasicMaterial({color: 0xffffff}));
        macroGroup.add(s);
        let scale = 1;
        let int = setInterval(() => {
            scale *= 1.2; s.scale.set(scale, scale, scale);
            s.material.opacity -= 0.05;
            if(scale > 400) { clearInterval(int); macroGroup.remove(s); }
        }, 20);
    }

    function setTab(name) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        event.target.classList.add('active');
    }

    function resetUniverse() { location.reload(); }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
